# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to copy to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported
# relative to the directory where the ini file is located.
# prepend_sys_path = .

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, paths must be separated by ';'
# version_locations = %(here)s/bar:%(here)s/bat;alembic/versions

# version path separator; as above, this defaults to the character
# used by os.pathsep. if set, set the separator you want to use
# version_path_separator = :

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = postgresql://postgres:postgres@db:5432/inventory_db


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for details.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
