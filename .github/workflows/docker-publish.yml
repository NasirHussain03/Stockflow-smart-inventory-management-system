name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-platform support (optional, but good practice)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx for optimized caching and builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build and push backend (server) image
      - name: Build and Push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/inventory-server:latest
            ${{ secrets.DOCKER_USERNAME }}/inventory-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Build and push frontend (client) production image
      - name: Build and Push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/inventory-client:latest
            ${{ secrets.DOCKER_USERNAME }}/inventory-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

